<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodexGame - Bibliothèque de jeux vidéo</title>
    <link rel="stylesheet" type="text/css" href="./style.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <section class="hero">
            <h2>Votre bibliothèque de jeux vidéo</h2>
            <p>Une base claire et professionnelle pour organiser, rechercher et présenter vos jeux.</p>
        </section>

        <section class="search-section">
            <label for="search" class="search-label">Rechercher un jeu</label>
            <input id="search" type="text" placeholder="Ex: Elden Ring" class="search-input">
            <label for="genre" class="genre-label">Filtrer par genre</label>
            <div class="genre-checkboxes">
                <label><input type="checkbox" value="action"> Action</label>
                <label><input type="checkbox" value="adventure"> Aventure</label>
                <label><input type="checkbox" value="rpg"> RPG</label>
                <label><input type="checkbox" value="strategy"> Stratégie</label>
                <label><input type="checkbox" value="puzzle"> Puzzle</label>
                <label><input type="checkbox" value="sports"> Sports</label>
                <label><input type="checkbox" value="simulation"> Simulation</label>
                <label><input type="checkbox" value="horror"> Horreur</label>
            </div>
        </section>
        <section class="games-grid"></section>
    </main>
    <div id="footer-placeholder"></div>
</body>
</html>
